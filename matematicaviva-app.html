<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blu:       #1a3a5c;
  --blu-mid:   #2d5f8a;
  --blu-soft:  #e8f0f8;
  --accento:   #d4882b;
  --accento-light: #fdf3e3;
  --testo:     #2c2c2c;
  --testo-soft:#5a5a6a;
  --bg:        #f7f8fc;
  --bianco:    #ffffff;
  --bordo:     #dde3ed;
  --raggio:    10px;
  --ombra:     0 2px 12px rgba(26,58,92,0.09);
  
  --text-hint: #9aa0ad;
  --radius-lg: 12px;
  --nav-hover: rgba(255,255,255,0.15);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--testo);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, var(--blu-mid) 0%, var(--blu) 100%);
  border-bottom: 1px solid var(--bordo);
  position: sticky;
  top: 0;
  z-index: 150;
  box-shadow: 0 2px 16px rgba(26,58,92,0.18);
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}

.logo {
  font-family: 'Lora', serif;
  font-size: 1.3rem;
  font-weight: 600;
  letter-spacing: .02em;
  color: #fff;
  text-decoration: none;
  opacity: .95;
  z-index: 160;
}
.logo span { color: #f0c06e; }

nav { display: flex; gap: 6px; flex-wrap: wrap; }
nav a {
  color: rgba(255,255,255,.82);
  text-decoration: none;
  font-size: .88rem;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  transition: background .2s, color .2s;
}
nav a:hover, nav a.active {
  background: var(--nav-hover);
  color: #fff;
}

.header-badge {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.06);
  padding: 4px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}

/* Pulsante Menu Mobile */
.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: #fff;
  font-size: 24px;
  cursor: pointer;
  z-index: 160;
  padding: 4px;
}

/* ── MAIN ── */
.main-wrap {
  flex: 1;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
  padding: 40px 24px 64px;
}

/* Toolbar Filtri */
.toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 2rem;
  background: var(--bianco);
  border: 1px solid var(--bordo);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
  box-shadow: var(--ombra);
}

.toolbar select {
  height: 40px;
  border: 1px solid var(--bordo);
  border-radius: var(--raggio);
  padding: 0 10px;
  font-size: 14px;
  background: var(--bg);
  color: var(--testo);
  font-family: inherit;
  outline: none;
  cursor: pointer;
  min-width: 150px;
  transition: border-color .15s;
}
.toolbar select:focus { border-color: var(--accento); }

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
}
.search-wrap i {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-hint); font-size: 16px; pointer-events: none;
}
#searchInput {
  width: 100%; height: 40px;
  padding: 0 10px 0 34px;
  border: 1px solid var(--bordo);
  border-radius: var(--raggio);
  background: var(--bg);
  color: var(--testo);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}
#searchInput:focus { border-color: var(--accento); }
#searchInput::placeholder { color: var(--text-hint); }

.result-count {
  font-size: 12px;
  color: var(--text-hint);
  white-space: nowrap;
  margin-left: auto;
}

/* Macro Categorie (Teoria, Esercizi, ecc.) */
.macro-section {
  margin-bottom: 2.5rem;
}
.macro-title {
  font-family: 'Lora', serif;
  font-size: 1.6rem;
  color: var(--blu);
  font-weight: 600;
  margin-bottom: 1rem;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--bordo);
}

/* Stile Tendine (Details/Summary) */
details {
  background: var(--bianco);
  border: 1px solid var(--bordo);
  border-radius: var(--raggio);
  margin-bottom: 12px;
  box-shadow: var(--ombra);
  overflow: hidden;
  transition: border-color .2s;
}
details[open] {
  border-color: var(--blu-mid);
}
summary {
  padding: 14px 20px;
  font-weight: 600;
  color: var(--blu);
  cursor: pointer;
  list-style: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
}
summary::-webkit-details-marker { display: none; }
summary::after {
  content: '▼';
  font-size: 0.75rem;
  color: var(--blu-mid);
  transition: transform .2s;
}
details[open] summary::after {
  transform: rotate(180deg);
}
summary .badge-count {
  background: var(--blu-soft);
  color: var(--blu-mid);
  font-size: 0.8rem;
  padding: 2px 10px;
  border-radius: 20px;
  margin-left: auto;
  margin-right: 15px;
}

/* Lista file dentro la tendina */
.doc-list {
  padding: 4px 16px 16px;
  border-top: 1px solid var(--bordo);
  background: #fafbfe;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Riga del singolo documento */
.doc-row {
  background: var(--bianco);
  border: 1px solid var(--bordo);
  border-radius: 8px;
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color .12s, box-shadow .12s, background-color .15s;
}
.doc-row:hover {
  background-color: var(--blu-soft);
  border-color: var(--blu-mid);
}
.doc-icon {
  width: 40px; height: 40px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 1.4rem;
}
.icon-pdf  { background: #ffebeb; color: #c92a2a; }
.icon-html { background: #eef5ff; color: #1c7ed6; }

.doc-title {
  font-size: .95rem; font-weight: 500;
  color: var(--testo); flex: 1; min-width: 0;
}
.badge-type {
  display: inline-block; font-size: .72rem; font-weight: 600;
  padding: 2px 8px; border-radius: 4px; margin-left: 8px;
}
.badge-pdf  { background: #ffebeb; color: #c92a2a; }
.badge-html { background: #eef5ff; color: #1c7ed6; }

.doc-meta {
  font-size: 11px; color: var(--testo-soft);
  white-space: nowrap; flex-shrink: 0;
}

/* Empty state */
.empty {
  text-align: center; padding: 3rem 1rem;
  color: var(--text-hint); font-size: 14px;
}
.empty i { font-size: 32px; display: block; margin-bottom: 8px; }

/* ── VIEWER OVERLAY ── */
.viewer-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,10,30,.65);
  z-index: 200;
  align-items: center; justify-content: center;
  padding: 1rem;
}
.viewer-overlay.open { display: flex; }
.viewer-box {
  background: var(--bianco);
  border-radius: var(--radius-lg);
  width: min(96vw, 960px);
  height: min(92vh, 760px);
  display: flex; flex-direction: column;
  border: 1px solid var(--bordo);
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,.3);
}
.viewer-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--bordo);
  background: var(--blu);
  flex-shrink: 0;
}
.viewer-title {
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,.9); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.btn-icon {
  width: 36px; height: 36px;
  border: 1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.06);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: rgba(255,255,255,.7); font-size: 18px;
  text-decoration: none; flex-shrink: 0;
  transition: background .12s;
}
.btn-icon:hover { background: rgba(255,255,255,.15); color: #fff; }
.viewer-frame { flex: 1; border: none; width: 100%; display: block; height: calc(100% - 57px); }

/* ── FOOTER ── */
footer {
  background: var(--blu-soft);
  border-top: 1px solid var(--bordo);
  margin-top: auto;
}
.footer-inner {
  max-width: 700px;
  margin: 0 auto;
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}
.footer-logo {
  font-family: 'Lora', serif;
  font-size: 1.2rem;
  color: var(--blu);
  font-weight: 600;
}
.footer-logo span { color: #f0c06e; }
.footer-info {
  font-size: .9rem;
  color: var(--testo-soft);
  text-align: center;
}
.footer-bio {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 4px 0;
}
.footer-bio span {
  background: var(--bianco);
  border: 1px solid var(--bordo);
  padding: 3px 12px;
  border-radius: 20px;
  font-size: .8rem;
  color: var(--testo-soft);
}
.footer-copy {
  font-size: .8rem; color: #8a9ab5; margin-top: 4px; text-align: center;
}
.footer-copy a { color: #8a9ab5; text-decoration: none; }
.footer-copy a:hover { color: var(--blu); }

/* ── MEDIA QUERIES MOBILE ── */
@media (max-width: 768px) {
  .menu-toggle {
    display: block;
  }

  nav {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 260px;
    background: var(--blu);
    flex-direction: column;
    padding: 80px 24px 24px;
    gap: 12px;
    z-index: 155;
    box-shadow: -4px 0 20px rgba(0,0,0,0.3);
  }
  nav.mobile-open {
    display: flex;
  }
  nav a {
    font-size: 1.05rem;
    padding: 12px 16px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    color: #fff;
  }

  .header-inner { padding: 12px 20px; }
  .header-badge { display: none; }

  .main-wrap { padding: 24px 16px 48px; }

  .toolbar {
    flex-direction: column;
    align-items: stretch;
    padding: 12px;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .toolbar select, .search-wrap {
    width: 100%;
    min-width: unset;
  }
  .result-count {
    margin-left: 0;
    text-align: center;
    width: 100%;
  }

  .macro-title { font-size: 1.35rem; }
  summary { padding: 12px 16px; font-size: 0.95rem; }
  summary .badge-count { margin-right: 8px; font-size: 0.75rem; }
  .doc-list { padding: 4px 10px 12px; }
  .doc-row { padding: 10px 12px; gap: 10px; }
  .doc-title { font-size: 0.88rem; }
  .doc-icon { width: 36px; height: 36px; font-size: 1.2rem; }
  .doc-meta { display: none; }

  .viewer-overlay { padding: 0; }
  .viewer-box { width: 100vw; height: 100vh; border-radius: 0; border: none; }
  .viewer-header { padding: 12px; }

  .footer-inner { padding: 32px 16px; }
}
</style>
</head>

  const isOpen = mainNav.classList.toggle("mobile-open");
  menuToggle.setAttribute("aria-expanded", isOpen);
  menuIcon.className = isOpen ? "ti ti-x" : "ti ti-menu-2";
});

mainNav.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", () => {
    mainNav.classList.remove("mobile-open");
    menuToggle.setAttribute("aria-expanded", "false");
    menuIcon.className = "ti ti-menu-2";
  });
});

function getFiltered() {
  const q = fQ.toLowerCase();
  return docs.filter(d => {
    if (fClasse !== "all" && d.classe !== parseInt(fClasse)) return false;
    if (fCat !== "all" && d.cat !== fCat) return false;
    if (fTipo !== "all" && d.tipo !== fTipo) return false;
    if (q && !d.titolo.toLowerCase().includes(q)) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const n = filtered.length;
  document.getElementById("resultCount").textContent = n + " risultat" + (n===1?"o":"i");
  document.getElementById("totalBadge").textContent = n + " document" + (n===1?"o":"i");

  const targetContainer = document.getElementById("docList");

  if (!filtered.length) {
    targetContainer.innerHTML =
      '<div class="empty"><i class="ti ti-mood-empty" aria-hidden="true"></i>Nessun documento trovato</div>';
    return;
  }

  const groups = {};
  filtered.forEach(d => {
    const k = d.cat + "_" + d.classe;
    if (!groups[k]) groups[k] = {cat:d.cat, classe:d.classe, items:[]};
    groups[k].items.push(d);
  });

  const catOrder = ["teoria","esercizi","schemi","lezioni"];
  const sorted = Object.values(groups).sort((a,b) => {
    const ci = catOrder.indexOf(a.cat) - catOrder.indexOf(b.cat);
    return ci !== 0 ? ci : a.classe - b.classe;
  });

  let html = "";
  let currentCat = "";

  sorted.forEach(g => {
    if (currentCat !== g.cat) {
      currentCat = g.cat;
      html += `<div class="macro-title">${catLabel[g.cat]}</div>`;
    }

    const forceOpen = (fQ !== "" || fClasse !== "all" || fCat !== "all" || fTipo !== "all") ? "open" : "";
    const s = g.items.length === 1 ? "e" : "i";

    html += `<details ${forceOpen}>`;
    html += `  <summary>Classe ${g.classe}ª <span class="badge-count">${g.items.length} lezion${s}</span></summary>`;
    html += `  <div class="doc-list">`;
    
    g.items.forEach(d => {
      const isPdf = d.tipo === "pdf";
      html += `    <div class="doc-row" tabindex="0" role="button" aria-label="Apri ${d.titolo}" data-url="${d.url}" data-title="${d.titolo}">`;
      html += `      <div class="doc-icon ${isPdf ? 'icon-pdf' : 'icon-html'}">`;
      html += `        <i class="ti ${isPdf ? 'ti-file-type-pdf' : 'ti-file-code'}" aria-hidden="true"></i>`;
      html += `      </div>`;
      html += `      <span class="doc-title">${d.titolo}<span class="badge-type ${isPdf ? 'badge-pdf' : 'badge-html'}">${d.tipo.toUpperCase()}</span></span>`;
      html += `      <span class="doc-meta">Classe ${d.classe}ª · ${catLabel[d.cat]}</span>`;
      html += `    </div>`;
    });
    
    html += `  </div>`;
    html += `</details>`;
  });

  targetContainer.innerHTML = html;

  document.querySelectorAll(".doc-row").forEach(row => {
    const open = () => openViewer(row.dataset.url, row.dataset.title);
    row.addEventListener("click", open);
    row.addEventListener("keydown", e => { if (e.key==="Enter"||e.key===" ") { e.preventDefault(); open(); } });
  });
}

document.getElementById("selClasse").addEventListener("change", e => { fClasse=e.target.value; render(); });
document.getElementById("selCat").addEventListener("change",    e => { fCat=e.target.value;    render(); });
document.getElementById("selTipo").addEventListener("change",   e => { fTipo=e.target.value;   render(); });
document.getElementById("searchInput").addEventListener("input", e => { fQ=e.target.value; render(); });

function openViewer(relUrl, title) {
  const full = BASE + relUrl;
  document.getElementById("viewerTitle").textContent = title;
  document.getElementById("viewerFrame").src = full;
  document.getElementById("viewerExtLink").href = full;
  document.getElementById("viewerOverlay").classList.add("open");
  document.getElementById("viewerClose").focus();
  document.body.style.overflow = "hidden";
}

function closeViewer() {
  document.getElementById("viewerOverlay").classList.remove("open");
  document.body.style.overflow = "";
  setTimeout(() => { document.getElementById("viewerFrame").src = ""; }, 200);
}

document.getElementById("viewerClose").addEventListener("click", closeViewer);
document.getElementById("viewerOverlay").addEventListener("click", e => {
  if (e.target === document.getElementById("viewerOverlay")) closeViewer();
});
document.addEventListener("keydown", e => { if (e.key==="Escape") closeViewer(); });

render();
</script>
</body>
</html>
