<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatematicaViva – Contenuti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --header-bg: #1a1a2e;
  --header-border: rgba(255,255,255,0.08);
  --accent: #4f8ef7;
  --accent-dark: #2563eb;
  --bg: #f5f6fa;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.16);
  --text: #1a1a2e;
  --text-muted: #5a6070;
  --text-hint: #9aa0ad;
  --radius: 8px;
  --radius-lg: 12px;
  --footer-bg: #1a1a2e;
  --nav-hover: rgba(255,255,255,0.12);
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  background: var(--header-bg);
  border-bottom: 1px solid var(--header-border);
  position: sticky;
  top: 0;
  z-index: 50;
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  height: 58px;
  gap: 2rem;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-symbol {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff; font-weight: 700;
  line-height: 1;
}
.logo-text {
  font-size: 17px; font-weight: 600;
  color: #fff; letter-spacing: -0.02em;
}

nav {
  display: flex;
  gap: 4px;
  flex: 1;
}
nav a {
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 6px;
  transition: background .15s, color .15s;
}
nav a:hover { background: var(--nav-hover); color: #fff; }
nav a.active { background: var(--nav-hover); color: #fff; }

.header-badge {
  margin-left: auto;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.06);
  padding: 3px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}

/* ── MAIN ── */
.main-wrap {
  flex: 1;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
  padding: 1.5rem 1.5rem 2rem;
}

/* Toolbar */
.toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 1.25rem;
  background: var(--surface);
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
}

.toolbar select {
  height: 36px;
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 0 10px;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  outline: none;
  cursor: pointer;
  min-width: 150px;
  transition: border-color .15s;
}
.toolbar select:focus { border-color: var(--accent); }

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
}
.search-wrap i {
  position: absolute; left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-hint); font-size: 16px; pointer-events: none;
}
#searchInput {
  width: 100%; height: 36px;
  padding: 0 10px 0 32px;
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}
#searchInput:focus { border-color: var(--accent); }
#searchInput::placeholder { color: var(--text-hint); }

.result-count {
  font-size: 12px;
  color: var(--text-hint);
  white-space: nowrap;
  margin-left: auto;
}

/* Section title */
.sec-title {
  font-size: 11px; font-weight: 600;
  color: var(--text-hint);
  letter-spacing: .07em;
  text-transform: uppercase;
  margin: 1.5rem 0 .5rem;
  padding-bottom: 5px;
  border-bottom: 0.5px solid var(--border);
}

/* Doc list */
.doc-list { display: flex; flex-direction: column; gap: 4px; }

.doc-row {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color .12s, box-shadow .12s;
}
.doc-row:hover {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(79,142,247,.08);
}
.doc-icon {
  width: 32px; height: 32px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 17px;
}
.icon-pdf  { background: #faece7; color: #993c1d; }
.icon-html { background: #e8f0fb; color: #1a56a0; }

.doc-title {
  font-size: 13px; font-weight: 500;
  color: var(--text); flex: 1; min-width: 0;
}
.badge {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 4px; margin-left: 6px;
  vertical-align: middle;
}
.badge-pdf  { background: #faece7; color: #993c1d; }
.badge-html { background: #e8f0fb; color: #1a56a0; }

.doc-meta {
  font-size: 11px; color: var(--text-hint);
  white-space: nowrap; flex-shrink: 0;
}

/* Empty */
.empty {
  text-align: center; padding: 4rem 2rem;
  color: var(--text-hint); font-size: 13px;
}
.empty i { font-size: 32px; display: block; margin-bottom: 8px; }

/* ── VIEWER ── */
.viewer-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,10,30,.65);
  z-index: 200;
  align-items: center; justify-content: center;
  padding: 1rem;
}
.viewer-overlay.open { display: flex; }
.viewer-box {
  background: var(--surface);
  border-radius: var(--radius-lg);
  width: min(96vw, 960px);
  height: min(92vh, 760px);
  display: flex; flex-direction: column;
  border: 0.5px solid var(--border-strong);
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,.3);
}
.viewer-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 0.5px solid var(--border);
  background: var(--header-bg);
  flex-shrink: 0;
}
.viewer-title {
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,.9); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.btn-icon {
  width: 30px; height: 30px;
  border: 1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.06);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: rgba(255,255,255,.7); font-size: 16px;
  text-decoration: none; flex-shrink: 0;
  transition: background .12s;
}
.btn-icon:hover { background: rgba(255,255,255,.15); color: #fff; }
.viewer-frame { flex: 1; border: none; width: 100%; display: block; }

/* ── FOOTER ── */
footer {
  background: var(--footer-bg);
  border-top: 1px solid rgba(255,255,255,.06);
  margin-top: auto;
}
.footer-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem 1.5rem 1.5rem;
}
.footer-top {
  display: flex;
  align-items: flex-start;
  gap: 2rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.footer-brand {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.footer-brand .logo-symbol { width: 32px; height: 32px; font-size: 18px; }
.footer-brand-text {
  font-size: 15px; font-weight: 600;
  color: #fff; letter-spacing: -0.01em;
}
.footer-info {
  flex: 1;
}
.footer-info p {
  font-size: 13px;
  color: rgba(255,255,255,.55);
  line-height: 1.6;
  margin-bottom: 2px;
}
.footer-info p strong {
  color: rgba(255,255,255,.75);
  font-weight: 500;
}
.footer-bottom {
  border-top: 1px solid rgba(255,255,255,.07);
  padding-top: 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.footer-bottom p {
  font-size: 12px;
  color: rgba(255,255,255,.35);
}
.footer-bottom a {
  color: rgba(255,255,255,.45);
  text-decoration: none;
  transition: color .15s;
}
.footer-bottom a:hover { color: rgba(255,255,255,.7); }

/* Responsive */
@media (max-width: 600px) {
  .header-inner { gap: 1rem; }
  nav a { font-size: 12px; padding: 5px 8px; }
  .logo-text { font-size: 15px; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .toolbar select, .search-wrap { width: 100%; min-width: unset; }
  .result-count { margin-left: 0; }
  .doc-meta { display: none; }
  .footer-top { flex-direction: column; gap: 1rem; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <a class="logo" href="https://matematicaviva.github.io/">
      <div class="logo-symbol">∑</div>
      <span class="logo-text">MatematicaViva</span>
    </a>
    <nav>
      <a href="https://matematicaviva.github.io/#teoria">Teoria</a>
      <a href="https://matematicaviva.github.io/#esercizi">Esercizi</a>
      <a href="https://matematicaviva.github.io/#schemi">Schemi</a>
      <a href="https://matematicaviva.github.io/#interattive">Lezioni interattive</a>
    </nav>
    <span class="header-badge" id="totalBadge">0 documenti</span>
  </div>
</header>

<!-- MAIN -->
<div class="main-wrap">
  <div class="toolbar">
    <select id="selClasse" aria-label="Filtra per classe">
      <option value="all">Tutte le classi</option>
      <option value="1">Classe 1ª</option>
      <option value="2">Classe 2ª</option>
      <option value="3">Classe 3ª</option>
      <option value="4">Classe 4ª</option>
      <option value="5">Classe 5ª</option>
    </select>
    <select id="selCat" aria-label="Filtra per categoria">
      <option value="all">Tutte le categorie</option>
      <option value="teoria">Teoria</option>
      <option value="esercizi">Esercizi</option>
      <option value="schemi">Schemi</option>
      <option value="lezioni">Lezioni interattive</option>
    </select>
    <select id="selTipo" aria-label="Filtra per formato">
      <option value="all">PDF e HTML</option>
      <option value="pdf">Solo PDF</option>
      <option value="html">Solo HTML</option>
    </select>
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="searchInput" placeholder="Cerca argomento…" aria-label="Cerca documento">
    </div>
    <span class="result-count" id="resultCount"></span>
  </div>

  <div id="docList" role="main" aria-live="polite"></div>
</div>

<!-- VIEWER -->
<div class="viewer-overlay" id="viewerOverlay" role="dialog" aria-modal="true" aria-label="Visualizzatore documento">
  <div class="viewer-box">
    <div class="viewer-header">
      <span class="viewer-title" id="viewerTitle"></span>
      <a class="btn-icon" id="viewerExtLink" href="#" target="_blank" rel="noopener" title="Apri in nuova scheda" aria-label="Apri in nuova scheda">
        <i class="ti ti-external-link" aria-hidden="true"></i>
      </a>
      <button class="btn-icon" id="viewerClose" aria-label="Chiudi visualizzatore">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
    </div>
    <iframe class="viewer-frame" id="viewerFrame" title="Documento" allowfullscreen></iframe>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-top">
      <div class="footer-brand">
        <div class="logo-symbol">∑</div>
        <span class="footer-brand-text">MatematicaViva</span>
      </div>
      <div class="footer-info">
        <p><strong>M. Prandelli</strong> — Docente di matematica</p>
        <p>Laurea in Matematica · PhD in Matematica pura e applicata</p>
        <p>Scuola Secondaria Superiore · Università</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2026 — MatematicaViva</p>
      <p>
        <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/deed.it" target="_blank" rel="noopener">
          Licenza Creative Commons BY-NC-ND 4.0
        </a>
      </p>
    </div>
  </div>
</footer>

<script>
const BASE = "https://matematicaviva.github.io/";

const docs = [
  {titolo:"Geometria: rette perpendicolari e parallele",cat:"teoria",classe:1,tipo:"pdf",url:"viewer.html?file=teoria/classe1/rette_parallele_perpendicolari.pdf"},
  {titolo:"Geometria: quadrilateri",cat:"teoria",classe:1,tipo:"pdf",url:"viewer.html?file=teoria/classe1/quadrilateri.pdf"},
  {titolo:"Algebra: scomposizione di polinomi",cat:"teoria",classe:1,tipo:"pdf",url:"viewer.html?file=teoria/classe1/scomposizione_polinomi.pdf"},
  {titolo:"Algebra: equazioni lineari intere e fratte",cat:"teoria",classe:1,tipo:"pdf",url:"viewer.html?file=teoria/classe1/equazioni_lineari.pdf"},
  {titolo:"Geometria: Teorema di Talete e similitudini",cat:"teoria",classe:2,tipo:"pdf",url:"viewer.html?file=teoria/classe2/talete_similitudini.pdf"},
  {titolo:"Geometria: Sezione aurea",cat:"teoria",classe:2,tipo:"pdf",url:"viewer.html?file=teoria/classe2/sezione_aurea.pdf"},
  {titolo:"Algebra: disequazioni di II grado",cat:"teoria",classe:2,tipo:"pdf",url:"viewer.html?file=teoria/classe2/disequazioni_secondo_grado.pdf"},
  {titolo:"Algebra: disequazioni di II grado con metodo algebrico e grafico",cat:"teoria",classe:2,tipo:"pdf",url:"viewer.html?file=teoria/classe2/disequazioni_parabola_v.pdf"},
  {titolo:"Goniometria: introduzione",cat:"teoria",classe:4,tipo:"pdf",url:"viewer.html?file=teoria/classe4/goniometria.pdf"},
  {titolo:"Geometria: esercizi su rette parallele e perpendicolari",cat:"esercizi",classe:1,tipo:"pdf",url:"viewer.html?file=esercizi/classe1/Scheda_Esercizi_Parallele_Perpendicolari.pdf"},
  {titolo:"Geometria: esercizi teoremi di Pitagora ed Euclide",cat:"esercizi",classe:2,tipo:"pdf",url:"viewer.html?file=esercizi/classe2/esercizi_euclide_pitagora_.pdf"},
  {titolo:"Geometria: sintesi quadrilateri",cat:"schemi",classe:1,tipo:"pdf",url:"viewer.html?file=schemi/classe1/formulario_quadrilateri.pdf"},
  {titolo:"Geometria: sintesi rette parallele e perpendicolari",cat:"schemi",classe:1,tipo:"pdf",url:"viewer.html?file=schemi/classe1/formulario_parallele_perpendicolari.pdf"},
  {titolo:"Algebra: sintesi scomposizione di polinomi",cat:"schemi",classe:1,tipo:"pdf",url:"viewer.html?file=schemi/classe1/formulario_polinomi.pdf"},
  {titolo:"Algebra: sintesi equazioni lineari intere e fratte",cat:"schemi",classe:1,tipo:"pdf",url:"viewer.html?file=schemi/classe1/sintesi_equazioni_lineari.pdf"},
  {titolo:"Algebra: sintesi disequazioni di secondo grado",cat:"schemi",classe:2,tipo:"pdf",url:"viewer.html?file=schemi/classe2/sintesi_disequazioni_sec.pdf"},
  {titolo:"Geometria: sintesi sezione aurea",cat:"schemi",classe:2,tipo:"pdf",url:"viewer.html?file=schemi/classe2/formulario_sezione_aurea.pdf"},
  {titolo:"Goniometria: sintesi relazioni introduttive",cat:"schemi",classe:4,tipo:"pdf",url:"viewer.html?file=schemi/classe4/sintesi_goniometria.pdf"},
  {titolo:"Geometria: rette parallele e perpendicolari",cat:"lezioni",classe:1,tipo:"html",url:"lezioni/classe1/rette_parallele_perpendicolari.html"},
  {titolo:"Geometria: esercizi rette parallele e perpendicolari",cat:"lezioni",classe:1,tipo:"html",url:"lezioni/classe1/Scheda_Esercizi_Parallele_Perpendicolari_def.html"},
  {titolo:"Geometria: quadrilateri",cat:"lezioni",classe:1,tipo:"html",url:"lezioni/classe1/quadrilateri_def.html"},
  {titolo:"Algebra: scomposizione di polinomi",cat:"lezioni",classe:1,tipo:"html",url:"lezioni/classe1/scomposizione_polinomi.html"},
  {titolo:"Algebra: equazioni lineari intere e fratte",cat:"lezioni",classe:1,tipo:"html",url:"lezioni/classe1/equazioni_lineari.html"},
  {titolo:"Geometria: Coniche",cat:"lezioni",classe:2,tipo:"html",url:"lezioni/classe2/coniche.html"},
  {titolo:"Geometria: Talete e le similitudini",cat:"lezioni",classe:2,tipo:"html",url:"lezioni/classe2/Talete_similitudini.html"},
  {titolo:"Geometria: Sezione aurea",cat:"lezioni",classe:2,tipo:"html",url:"lezioni/classe2/Sezione_aurea_def.html"},
  {titolo:"Algebra: disequazioni di secondo grado",cat:"lezioni",classe:2,tipo:"html",url:"lezioni/classe2/Disequazioni_secondo_grado_def.html"},
  {titolo:"Algebra: disequazioni di secondo grado e parabola",cat:"lezioni",classe:2,tipo:"html",url:"lezioni/classe2/disequazioni_parabola_v.html"},
  {titolo:"Circonferenza",cat:"lezioni",classe:3,tipo:"html",url:"lezioni/classe3/circonferenza.html"},
  {titolo:"Goniometria: introduzione",cat:"lezioni",classe:4,tipo:"html",url:"lezioni/classe4/goniometria_def.html"},
  {titolo:"Coordinate sferiche",cat:"lezioni",classe:5,tipo:"html",url:"lezioni/classe5/Coordinate_sferiche_def.html"},
];

const catLabel = {teoria:"Teoria", esercizi:"Esercizi", schemi:"Schemi", lezioni:"Lezioni interattive"};
let fClasse="all", fCat="all", fTipo="all", fQ="";

function getFiltered() {
  const q = fQ.toLowerCase();
  return docs.filter(d => {
    if (fClasse !== "all" && d.classe !== parseInt(fClasse)) return false;
    if (fCat !== "all" && d.cat !== fCat) return false;
    if (fTipo !== "all" && d.tipo !== fTipo) return false;
    if (q && !d.titolo.toLowerCase().includes(q)) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const n = filtered.length;
  document.getElementById("resultCount").textContent = n + " risultat" + (n===1?"o":"i");
  document.getElementById("totalBadge").textContent = n + " document" + (n===1?"o":"i");

  if (!filtered.length) {
    document.getElementById("docList").innerHTML =
      '<div class="empty"><i class="ti ti-mood-empty" aria-hidden="true"></i>Nessun documento trovato</div>';
    return;
  }

  const groups = {};
  filtered.forEach(d => {
    const k = d.cat + "_" + d.classe;
    if (!groups[k]) groups[k] = {cat:d.cat, classe:d.classe, items:[]};
    groups[k].items.push(d);
  });

  const catOrder = ["teoria","esercizi","schemi","lezioni"];
  const sorted = Object.values(groups).sort((a,b) => {
    const ci = catOrder.indexOf(a.cat) - catOrder.indexOf(b.cat);
    return ci !== 0 ? ci : a.classe - b.classe;
  });

  let html = "";
  sorted.forEach(g => {
    const showCat = fCat === "all";
    const showCls = fClasse === "all";
    let label = "";
    if (showCat && showCls) label = `${catLabel[g.cat]} — Classe ${g.classe}ª`;
    else if (showCat) label = catLabel[g.cat];
    else if (showCls) label = `Classe ${g.classe}ª`;
    if (label) html += `<div class="sec-title">${label}</div>`;

    html += `<div class="doc-list">`;
    g.items.forEach(d => {
      const isPdf = d.tipo === "pdf";
      html += `<div class="doc-row" tabindex="0" role="button" aria-label="Apri ${d.titolo}" data-url="${d.url}" data-title="${d.titolo}">
        <div class="doc-icon ${isPdf?"icon-pdf":"icon-html"}">
          <i class="ti ${isPdf?"ti-file-type-pdf":"ti-player-play"}" aria-hidden="true"></i>
        </div>
        <span class="doc-title">${d.titolo}<span class="badge ${isPdf?"badge-pdf":"badge-html"}">${isPdf?"PDF":"HTML"}</span></span>
        <span class="doc-meta">Classe ${d.classe}ª · ${catLabel[d.cat]}</span>
      </div>`;
    });
    html += `</div>`;
  });

  document.getElementById("docList").innerHTML = html;
  document.querySelectorAll(".doc-row").forEach(row => {
    const open = () => openViewer(row.dataset.url, row.dataset.title);
    row.addEventListener("click", open);
    row.addEventListener("keydown", e => { if (e.key==="Enter"||e.key===" ") { e.preventDefault(); open(); } });
  });
}

document.getElementById("selClasse").addEventListener("change", e => { fClasse=e.target.value; render(); });
document.getElementById("selCat").addEventListener("change",    e => { fCat=e.target.value;    render(); });
document.getElementById("selTipo").addEventListener("change",   e => { fTipo=e.target.value;   render(); });
document.getElementById("searchInput").addEventListener("input", e => { fQ=e.target.value; render(); });

function openViewer(relUrl, title) {
  const full = BASE + relUrl;
  document.getElementById("viewerTitle").textContent = title;
  document.getElementById("viewerFrame").src = full;
  document.getElementById("viewerExtLink").href = full;
  document.getElementById("viewerOverlay").classList.add("open");
  document.getElementById("viewerClose").focus();
}

function closeViewer() {
  document.getElementById("viewerOverlay").classList.remove("open");
  setTimeout(() => { document.getElementById("viewerFrame").src = ""; }, 200);
}

document.getElementById("viewerClose").addEventListener("click", closeViewer);
document.getElementById("viewerOverlay").addEventListener("click", e => {
  if (e.target === document.getElementById("viewerOverlay")) closeViewer();
});
document.addEventListener("keydown", e => { if (e.key==="Escape") closeViewer(); });

render();
</script>
</body>
</html>
